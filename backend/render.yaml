services:
  - type: web
    name: phishguard-backend
    env: python
    region: singapore
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 4 -k uvicorn.workers.UvicornWorker app.main:app
    envVars:
      - key: DATABASE_URL
        sync: false # User will provide this in Render dashboard or it can be linked
      - key: PYTHON_VERSION
        value: 3.12.2
